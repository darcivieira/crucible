services:
  dashboard:
    image: ${CRUCIBLE_IMAGE:-darcivieirajr/crucible:latest}
    command: ["serve", "--host", "0.0.0.0", "--port", "7777"]
    init: true
    restart: unless-stopped
    ports:
      - "${CRUCIBLE_DASHBOARD_PORT:-7777}:7777"
    environment: &crucible-env
      CRUCIBLE_ENV: docker
      CRUCIBLE_DASHBOARD_HOST: 0.0.0.0
      CRUCIBLE_RUNS_DIR: /data/runs
      CRUCIBLE_CACHE_DIR: /data/cache
      CRUCIBLE_REPORTS_DIR: /data/reports
      CRUCIBLE_SQLITE_PATH: /data/crucible.sqlite
      CRUCIBLE_OLLAMA_URL: ${CRUCIBLE_OLLAMA_URL:-http://host.docker.internal:11434}
      CRUCIBLE_VLLM_URL: ${CRUCIBLE_VLLM_URL:-http://host.docker.internal:8000/v1}
      CRUCIBLE_LLAMACPP_URL: ${CRUCIBLE_LLAMACPP_URL:-http://host.docker.internal:8080}
    volumes:
      - crucible-data:/data
      - ./workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7777/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api:
    image: ${CRUCIBLE_IMAGE:-darcivieirajr/crucible:latest}
    command: ["api", "--host", "0.0.0.0", "--port", "7788"]
    init: true
    restart: unless-stopped
    ports:
      - "${CRUCIBLE_API_PORT:-7788}:7788"
    environment:
      <<: *crucible-env
    volumes:
      - crucible-data:/data
      - ./workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:7788/docs', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  crucible-data:
