name: Bug report
description: Report a reproducible problem in Crucible.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Include commands, config, prompt/gabarito snippets, and provider used.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Python:
        - Crucible:
        - Provider/model:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      render: shell
