threshold: 90.0
max_iterations: 4
max_cost_usd: 5.0
max_wallclock_seconds: 1800
parallelism: 2
use_gabarito_split: true
train_ratio: 0.7
val_ratio: 0.15

target_model:
  provider: ollama
  model_id: gemma3:4b
  role: target
  params:
    temperature: 0.0
    max_tokens: 64
  rate_limit:
    max_concurrent: 1

reasoning_model:
  provider: openai
  model_id: gpt-5
  role: reasoning
  params:
    temperature: 0.0
    max_tokens: 2048
