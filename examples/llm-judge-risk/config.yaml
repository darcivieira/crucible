threshold: 85.0
max_iterations: 3
max_cost_usd: 8.0
max_wallclock_seconds: 1800
parallelism: 2

target_model:
  provider: ollama
  model_id: gemma3:4b
  role: target
  params:
    temperature: 0.0
    max_tokens: 256
  rate_limit:
    max_concurrent: 1

reasoning_model:
  provider: openai
  model_id: gpt-5
  role: reasoning
  params:
    temperature: 0.0
    max_tokens: 2048

judge_models:
  - provider: openai
    model_id: gpt-5
    role: judge
    params:
      temperature: 0.0
      max_tokens: 512
