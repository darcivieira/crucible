name: structured-output-schema
version: v1
description: Example gabarito for validating only the returned JSON Schema contract.
cases:
  - id: summary-schema-001
    input: "Cliente relatou atraso no pagamento, mas prometeu quitar em 7 dias."
    expected_output: |
      {
        "type": "object",
        "additionalProperties": false,
        "required": ["summary", "risk"],
        "properties": {
          "summary": {"type": "string"},
          "risk": {"type": "string", "enum": ["low", "medium", "high"]}
        }
      }
    assertion:
      type: json_schema
    weight: 1.0
    tags: [structured-output, schema-contract]
